services:
  - type: web
    name: zendvo
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run db:migrate && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zendvo-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: STELLAR_SECRET_KEY
        sync: false
      - key: STELLAR_CONTRACT_ID
        sync: false

databases:
  - name: zendvo-db
    plan: free
